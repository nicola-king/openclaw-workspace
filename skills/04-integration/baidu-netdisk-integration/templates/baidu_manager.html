<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度网盘管理 - 太一 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100">
    <div class="max-w-7xl mx-auto px-4 py-4">
        <a href="/" class="inline-flex items-center text-indigo-600 hover:text-indigo-800">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            返回首页
        </a>
    </div>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">☁️ 百度网盘管理</h1>

        <!-- 状态概览 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-gray-700">客户端状态</h3>
                    <span id="client-status" class="px-3 py-1 rounded-full text-sm">⚪ 检查中</span>
                </div>
                <p id="client-detail" class="text-gray-500 text-sm">--</p>
            </div>

            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-gray-700">bypy 配置</h3>
                    <span id="bypy-status" class="px-3 py-1 rounded-full text-sm">⚪ 检查中</span>
                </div>
                <p id="bypy-detail" class="text-gray-500 text-sm">--</p>
            </div>

            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-gray-700">网盘配额</h3>
                </div>
                <p id="quota-detail" class="text-gray-500 text-sm">加载中...</p>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <h3 class="text-xl font-bold text-gray-800 mb-4">🛠️ 快捷操作</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="backupWorkspace()" class="px-4 py-3 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition-colors">
                    💾 备份工作区
                </button>
                <button onclick="syncFromNetdisk()" class="px-4 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors">
                    📥 从网盘同步
                </button>
                <button onclick="refreshStatus()" class="px-4 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">
                    🔄 刷新状态
                </button>
                <button onclick="openBaiduNetdisk()" class="px-4 py-3 bg-purple-500 text-white rounded-lg hover:bg-purple-600 transition-colors">
                    🌐 打开客户端
                </button>
            </div>
        </div>

        <!-- 文件列表 -->
        <div class="bg-white rounded-xl shadow-lg p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold text-gray-800">📁 网盘文件</h3>
                <input type="text" id="current-path" value="/apps/taiyi" 
                       class="px-3 py-2 border rounded-lg text-sm" readonly>
            </div>
            
            <div class="flex space-x-4 mb-4">
                <input type="text" id="search-keyword" placeholder="搜索文件..." 
                       class="flex-1 px-4 py-2 border rounded-lg">
                <button onclick="searchFiles()" class="px-6 py-2 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600">
                    🔍 搜索
                </button>
            </div>

            <div id="file-list" class="space-y-2">
                <p class="text-gray-500 text-center py-8">加载中...</p>
            </div>
        </div>

        <!-- 操作日志 -->
        <div class="bg-white rounded-xl shadow-lg p-6 mt-8">
            <h3 class="text-xl font-bold text-gray-800 mb-4">📋 操作日志</h3>
            <div id="operation-log" class="bg-gray-900 text-green-400 font-mono text-sm p-4 rounded-lg h-48 overflow-auto">
                等待操作...
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:5003/api/baidu';

        function log(message) {
            const logDiv = document.getElementById('operation-log');
            const time = new Date().toLocaleTimeString('zh-CN');
            logDiv.innerHTML += `[${time}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function loadStatus() {
            try {
                const response = await fetch(`${API_BASE}/status`);
                const data = await response.json();

                // 客户端状态
                const clientEl = document.getElementById('client-status');
                const clientDetail = document.getElementById('client-detail');
                if (data.client_running) {
                    clientEl.textContent = '🟢 运行中';
                    clientEl.className = 'px-3 py-1 rounded-full text-sm bg-green-100 text-green-800';
                    clientDetail.textContent = '百度网盘客户端正常运行';
                } else {
                    clientEl.textContent = '🔴 已停止';
                    clientEl.className = 'px-3 py-1 rounded-full text-sm bg-red-100 text-red-800';
                    clientDetail.textContent = '客户端未运行';
                }

                // bypy 配置
                const bypyEl = document.getElementById('bypy-status');
                const bypyDetail = document.getElementById('bypy-detail');
                if (data.bypy_configured) {
                    bypyEl.textContent = '✅ 已配置';
                    bypyEl.className = 'px-3 py-1 rounded-full text-sm bg-green-100 text-green-800';
                    bypyDetail.textContent = 'bypy CLI 可用';
                } else {
                    bypyEl.textContent = '❌ 未配置';
                    bypyEl.className = 'px-3 py-1 rounded-full text-sm bg-red-100 text-red-800';
                    bypyDetail.textContent = '需要授权 bypy';
                }

                // 配额
                const quotaDetail = document.getElementById('quota-detail');
                if (data.quota && !data.quota.error) {
                    quotaDetail.textContent = `${data.quota.used || '未知'} / ${data.quota.quota || '未知'}`;
                } else {
                    quotaDetail.textContent = '无法获取配额';
                }

                log('状态加载完成');

            } catch (error) {
                log(`状态加载失败：${error.message}`);
            }
        }

        async function loadFiles(path = '/apps/taiyi') {
            try {
                const response = await fetch(`${API_BASE}/list?path=${encodeURIComponent(path)}`);
                const data = await response.json();

                const listDiv = document.getElementById('file-list');
                
                if (data.success && data.files) {
                    listDiv.innerHTML = data.files.map(file => `
                        <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                            <span class="font-mono text-sm">📄 ${file}</span>
                            <div class="space-x-2">
                                <button onclick="downloadFile('${file}')" class="text-indigo-600 hover:text-indigo-800 text-sm">⬇️ 下载</button>
                                <button onclick="deleteFile('${file}')" class="text-red-600 hover:text-red-800 text-sm">🗑️ 删除</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    listDiv.innerHTML = '<p class="text-gray-500 text-center py-8">暂无文件或目录为空</p>';
                }

            } catch (error) {
                log(`加载文件列表失败：${error.message}`);
            }
        }

        async function backupWorkspace() {
            log('开始备份工作区...');
            try {
                const response = await fetch(`${API_BASE}/backup`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                const data = await response.json();

                if (data.success) {
                    log(`✅ 备份完成：${data.backed_up} 个文件`);
                    alert(`备份成功！\n已备份 ${data.backed_up} 个文件`);
                } else {
                    log(`❌ 备份失败：${data.error || '未知错误'}`);
                    alert(`备份失败：${data.error || '未知错误'}`);
                }
            } catch (error) {
                log(`备份失败：${error.message}`);
                alert(`备份失败：${error.message}`);
            }
        }

        async function syncFromNetdisk() {
            log('开始从网盘同步...');
            try {
                const response = await fetch(`${API_BASE}/sync`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                const data = await response.json();

                if (data.success) {
                    log(`✅ 同步完成：${data.synced.length} 个文件`);
                    alert(`同步成功！\n已同步 ${data.synced.length} 个文件`);
                } else {
                    log(`❌ 同步失败：${data.error || '未知错误'}`);
                }
            } catch (error) {
                log(`同步失败：${error.message}`);
            }
        }

        async function searchFiles() {
            const keyword = document.getElementById('search-keyword').value;
            if (!keyword) {
                alert('请输入搜索关键词');
                return;
            }

            log(`搜索文件：${keyword}`);
            try {
                const response = await fetch(`${API_BASE}/search?keyword=${encodeURIComponent(keyword)}`);
                const data = await response.json();

                if (data.success) {
                    log(`搜索完成，找到 ${data.files?.length || 0} 个文件`);
                }
            } catch (error) {
                log(`搜索失败：${error.message}`);
            }
        }

        function downloadFile(filename) {
            log(`下载文件：${filename}`);
            alert('下载功能开发中...');
        }

        function deleteFile(filename) {
            if (!confirm(`确定要删除 ${filename} 吗？`)) return;
            log(`删除文件：${filename}`);
            alert('删除功能开发中...');
        }

        function refreshStatus() {
            log('刷新状态...');
            loadStatus();
            loadFiles();
        }

        function openBaiduNetdisk() {
            alert('可通过桌面快捷方式打开百度网盘客户端');
        }

        // 初始化
        loadStatus();
        loadFiles();
    </script>
</body>
</html>
