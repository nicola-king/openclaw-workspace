<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务详情 - 太一 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-purple-100">
    <!-- 返回按钮 -->
    <div class="max-w-7xl mx-auto px-4 py-4">
        <a href="/" class="inline-flex items-center text-indigo-600 hover:text-indigo-800">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            返回首页
        </a>
    </div>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- 服务信息卡片 -->
        <div class="bg-white rounded-xl shadow-lg p-8 mb-8">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 id="service-name" class="text-3xl font-bold text-gray-800">加载中...</h1>
                    <p id="service-description" class="text-gray-500 mt-2">--</p>
                </div>
                <span id="service-status" class="px-4 py-2 rounded-full text-lg font-semibold">⚪ 检查中</span>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div class="bg-gray-50 rounded-lg p-4">
                    <p class="text-gray-500 text-sm">端口</p>
                    <p id="service-port" class="text-2xl font-bold text-indigo-600">--</p>
                </div>
                <div class="bg-gray-50 rounded-lg p-4">
                    <p class="text-gray-500 text-sm">状态</p>
                    <p id="service-running" class="text-2xl font-bold">--</p>
                </div>
            </div>

            <div id="service-actions" class="mt-6 flex space-x-4">
                <!-- 动态生成操作按钮 -->
            </div>
        </div>

        <!-- 日志区域 -->
        <div class="bg-white rounded-xl shadow-lg p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">📋 服务日志</h2>
            <div id="service-logs" class="bg-gray-900 text-green-400 font-mono text-sm p-4 rounded-lg h-64 overflow-auto">
                加载中...
            </div>
            <button onclick="refreshLogs()" class="mt-4 px-4 py-2 bg-indigo-500 text-white rounded hover:bg-indigo-600">
                🔄 刷新日志
            </button>
        </div>
    </main>

    <script>
        const serviceId = "{{ service_id }}";

        async function loadServiceDetail() {
            try {
                const response = await fetch(`/api/service/${serviceId}`);
                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                document.getElementById('service-name').textContent = data.name;
                document.getElementById('service-description').textContent = data.description;
                document.getElementById('service-port').textContent = data.port || 'N/A';
                
                const statusEl = document.getElementById('service-status');
                const runningEl = document.getElementById('service-running');
                
                if (data.running) {
                    statusEl.textContent = '🟢 运行中';
                    statusEl.className = 'px-4 py-2 rounded-full text-lg font-semibold bg-green-100 text-green-800';
                    runningEl.textContent = '正常运行';
                    runningEl.className = 'text-2xl font-bold text-green-600';
                } else {
                    statusEl.textContent = '🔴 已停止';
                    statusEl.className = 'px-4 py-2 rounded-full text-lg font-semibold bg-red-100 text-red-800';
                    runningEl.textContent = '未运行';
                    runningEl.className = 'text-2xl font-bold text-red-600';
                }

                // 生成操作按钮
                const actionsDiv = document.getElementById('service-actions');
                if (data.url) {
                    actionsDiv.innerHTML += `
                        <a href="${data.url}" target="_blank" class="px-6 py-3 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition-colors">
                            🌐 打开服务
                        </a>
                    `;
                }
                if (!data.running) {
                    actionsDiv.innerHTML += `
                        <button onclick="startService()" class="px-6 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors">
                            ▶️ 启动服务
                        </button>
                    `;
                } else {
                    actionsDiv.innerHTML += `
                        <button onclick="stopService()" class="px-6 py-3 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">
                            ⏹️ 停止服务
                        </button>
                    `;
                }

                // 加载日志
                loadLogs();

            } catch (error) {
                console.error('加载失败:', error);
                alert('加载服务详情失败');
            }
        }

        async function loadLogs() {
            const logsDiv = document.getElementById('service-logs');
            logsDiv.textContent = '暂无日志文件';
        }

        function refreshLogs() {
            loadLogs();
        }

        async function startService() {
            alert('启动功能开发中...');
        }

        async function stopService() {
            if (!confirm('确定要停止服务吗？')) return;
            alert('停止功能开发中...');
        }

        loadServiceDetail();
    </script>
</body>
</html>
