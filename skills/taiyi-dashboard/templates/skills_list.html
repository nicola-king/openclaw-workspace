<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能列表 - 太一 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-indigo-100">
    <div class="max-w-7xl mx-auto px-4 py-4">
        <a href="/" class="inline-flex items-center text-indigo-600 hover:text-indigo-800">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            返回首页
        </a>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold text-gray-800">🎯 技能列表</h1>
            <a href="http://localhost:5002" target="_blank" class="px-6 py-3 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition-colors">
                打开 Skill Dashboard
            </a>
        </div>

        <!-- 搜索框 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <input type="text" id="search-input" placeholder="🔍 搜索技能..." 
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                   oninput="filterSkills()">
        </div>

        <!-- 技能网格 -->
        <div id="skills-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-500 col-span-full text-center py-8">加载中...</p>
        </div>
    </main>

    <script>
        let allSkills = [];

        async function loadSkills() {
            try {
                const response = await fetch('http://localhost:5002/api/skills');
                const data = await response.json();
                
                if (data && data.skills) {
                    allSkills = data.skills;
                    renderSkills(allSkills);
                }
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('skills-grid').innerHTML = `
                    <div class="col-span-full text-center py-8">
                        <p class="text-red-500">加载失败，请确保 Skill Dashboard 运行中</p>
                        <a href="http://localhost:5002" class="text-indigo-600 hover:text-indigo-800 mt-2 inline-block">打开 Skill Dashboard →</a>
                    </div>
                `;
            }
        }

        function renderSkills(skills) {
            const grid = document.getElementById('skills-grid');
            
            if (!skills || skills.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 text-center col-span-full py-8">暂无技能数据</p>';
                return;
            }
            
            grid.innerHTML = skills.map(skill => {
                const name = skill.name || skill.id || 'Unknown';
                const desc = skill.description || '暂无描述';
                const version = skill.version || '1.0.0';
                const status = skill.status || 'active';
                
                const statusColors = {
                    active: 'bg-green-100 text-green-800',
                    stable: 'bg-blue-100 text-blue-800',
                    deprecated: 'bg-red-100 text-red-800'
                };
                
                return `
                    <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg hover:scale-105 transition-all">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-lg font-bold text-gray-800">${name}</h3>
                            <span class="px-2 py-1 text-xs rounded-full ${statusColors[status] || statusColors.active}">
                                ${status}
                            </span>
                        </div>
                        <p class="text-sm text-gray-600 mb-3">${desc}</p>
                        <div class="flex items-center justify-between text-xs text-gray-500">
                            <span>v${version}</span>
                            <span>${skill.files || 0} 文件</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterSkills() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allSkills.filter(s => 
                s.name.toLowerCase().includes(query) || 
                s.id.toLowerCase().includes(query) ||
                (s.description && s.description.toLowerCase().includes(query))
            );
            renderSkills(filtered);
        }

        loadSkills();
    </script>
</body>
</html>
