<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD 文件查看器 - 太一 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
    <style>
        .markdown-body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }
        .markdown-body h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.25em; }
        .markdown-body code {
            background-color: rgba(27,31,35,0.05);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }
        .markdown-body pre {
            background-color: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow: auto;
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 16px 0;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #dfe2e5;
            padding: 6px 13px;
        }
        .markdown-body th {
            background-color: #f6f8fa;
            font-weight: 600;
        }
        .markdown-body tr:nth-child(2n) {
            background-color: #f6f8fa;
        }
        .markdown-body blockquote {
            border-left: 4px solid #dfe2e5;
            padding: 0 16px;
            color: #6a737d;
            margin: 16px 0;
        }
        .markdown-body ul, .markdown-body ol {
            padding-left: 2em;
            margin: 16px 0;
        }
        .markdown-body a {
            color: #0366d6;
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }
        .markdown-body img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100">
    <!-- 顶部导航 -->
    <header class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-indigo-600">📄 MD 文件查看器</h1>
                    <p class="text-gray-500 mt-1">Markdown 文档阅读 · 支持语法高亮</p>
                </div>
                <a href="/" class="text-indigo-600 hover:text-indigo-800 font-semibold">← 返回 Dashboard</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- 左侧：文件列表 -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-md p-6 sticky top-4">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">📁 文件列表</h3>
                    <div class="mb-4">
                        <input type="text" id="search-input" placeholder="搜索文件..." 
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div id="file-list" class="space-y-2 max-h-[600px] overflow-y-auto">
                        <p class="text-gray-500 text-sm">加载中...</p>
                    </div>
                </div>
            </div>

            <!-- 右侧：MD 内容 -->
            <div class="lg:col-span-3">
                <div class="bg-white rounded-xl shadow-md p-6">
                    <div id="file-header" class="flex items-center justify-between mb-4 pb-4 border-b">
                        <div>
                            <h2 id="file-name" class="text-xl font-bold text-gray-800">选择一个文件</h2>
                            <p id="file-path" class="text-sm text-gray-500"></p>
                        </div>
                        <button id="refresh-btn" onclick="loadFileContent()" 
                                class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">
                            🔄 刷新
                        </button>
                    </div>
                    <div id="md-content" class="markdown-body text-gray-800">
                        <p class="text-gray-500">请从左侧选择一个 MD 文件查看内容</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let allFiles = [];
        let currentFile = null;

        // 加载文件列表
        async function loadFileList() {
            try {
                const response = await fetch('/api/md-files');
                allFiles = await response.json();
                renderFileList(allFiles);
            } catch (error) {
                console.error('加载文件列表失败:', error);
                document.getElementById('file-list').innerHTML = 
                    '<p class="text-red-500 text-sm">加载失败</p>';
            }
        }

        // 渲染文件列表
        function renderFileList(files) {
            const list = document.getElementById('file-list');
            if (files.length === 0) {
                list.innerHTML = '<p class="text-gray-500 text-sm">暂无文件</p>';
                return;
            }

            list.innerHTML = files.map(file => `
                <div onclick="selectFile('${file.path}')" 
                     class="p-3 rounded-lg cursor-pointer hover:bg-indigo-50 transition-colors ${currentFile === file.path ? 'bg-indigo-100 border-2 border-indigo-500' : 'bg-gray-50'}">
                    <p class="font-medium text-gray-700 truncate">📄 ${file.name}</p>
                    <p class="text-xs text-gray-500 mt-1">${file.dir} · ${file.created}</p>
                </div>
            `).join('');
        }

        // 选择文件
        function selectFile(filePath) {
            currentFile = filePath;
            loadFileContent(filePath);
            renderFileList(allFiles);
        }

        // 加载文件内容
        async function loadFileContent(filePath) {
            const path = filePath || currentFile;
            if (!path) return;

            try {
                const response = await fetch(`/api/md-content?path=${encodeURIComponent(path)}`);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('md-content').innerHTML = 
                        `<p class="text-red-500">加载失败：${data.error}</p>`;
                    return;
                }

                document.getElementById('file-name').textContent = data.name;
                document.getElementById('file-path').textContent = data.path;
                
                // 使用 marked 解析 Markdown
                const html = marked.parse(data.content);
                document.getElementById('md-content').innerHTML = html;

            } catch (error) {
                console.error('加载文件内容失败:', error);
                document.getElementById('md-content').innerHTML = 
                    '<p class="text-red-500">加载失败</p>';
            }
        }

        // 搜索功能
        document.getElementById('search-input').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allFiles.filter(file => 
                file.name.toLowerCase().includes(keyword) ||
                file.dir.toLowerCase().includes(keyword)
            );
            renderFileList(filtered);
        });

        // 初始化
        loadFileList();
        
        // 检查 URL 参数，直接打开指定文件
        const urlParams = new URLSearchParams(window.location.search);
        const fileParam = urlParams.get('file');
        if (fileParam) {
            // 等待文件列表加载完成后查找匹配的文件
            setTimeout(() => {
                const matched = allFiles.find(f => f.name === fileParam);
                if (matched) {
                    selectFile(matched.path);
                }
            }, 500);
        }
    </script>
</body>
</html>
