name: task-orchestrator
version: 1.0.0
description: 智能任务编排引擎 - 负责任务分解→分配→分发→执行→验收→汇报的完整闭环
author: 太一 AGI
license: MIT
tags:
  - orchestration
  - task-management
  - automation
  - multi-bot

entry: orchestrator.py
python:
  version: ">=3.8"
  dependencies: []

commands:
  decompose:
    description: 任务分解
    usage: python3 orchestrator.py decompose "<任务描述>"
  
  dispatch:
    description: 任务分发
    usage: python3 orchestrator.py dispatch <bot> [任务 ID]
  
  track:
    description: 执行追踪
    usage: python3 task-tracker.py scan
  
  validate:
    description: 成果验收
    usage: python3 validator.py validate --task <任务 ID>
  
  correct:
    description: 纠偏机制
    usage: python3 correction.py detect
  
  report:
    description: 生成报告
    usage: python3 orchestrator.py summary

integration:
  inbox: ~/.openclaw/agents/{bot}/inbox/
  outbox: ~/.openclaw/agents/{bot}/outbox/
  reports: ~/.openclaw/workspace/reports/

features:
  - 智能任务分解
  - Bot 职责匹配分配
  - 标准化委派单
  - 实时进度追踪
  - 自动化纠偏
  - 成果验收
  - 报告归档

security:
  auto_execute:
    - 任务分解
    - 分发送达
    - 进度检查
    - 报告生成
  
  require_confirmation:
    - 任务重新分配
    - 截止时间调整
    - 资源追加
    - 任务降级/取消
