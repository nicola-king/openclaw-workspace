<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 庖丁 ROI 仪表盘 - 太一 AGI v4.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            /* 🦞 赛博龙虾主题背景 */
            background: linear-gradient(135deg, #0D0D1A 0%, #1A1A2E 50%, #2E1065 100%);
            color: #FFFFFF;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            /* 赛博龙虾边框 */
            border-bottom: 2px solid #8B5CF6;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            /* 蓝紫霓虹渐变 */
            background: linear-gradient(45deg, #8B5CF6, #9D5BFF, #00F0FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        header p {
            color: #888;
            font-size: 1.1em;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            /* 霓虹紫光晕 */
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4), 0 0 20px rgba(157, 91, 255, 0.2);
        }
        
        .card h3 {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .card .value {
            font-size: 2.5em;
            font-weight: bold;
            /* 蓝紫霓虹渐变 */
            background: linear-gradient(45deg, #8B5CF6, #9D5BFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .card .unit {
            font-size: 0.5em;
            color: #888;
            margin-left: 5px;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chart-container h3 {
            margin-bottom: 20px;
            color: #FF6B6B;
        }
        
        .table-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: rgba(255, 107, 107, 0.2);
            color: #FF6B6B;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .status-success {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }
        
        .roi-high {
            color: #4CAF50;
            font-weight: bold;
        }
        
        .roi-medium {
            color: #FFC107;
            font-weight: bold;
        }
        
        .refresh-info {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.9em;
        }
        
        .lobster-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="lobster-icon">🦞</div>
            <h1>庖丁 ROI 仪表盘</h1>
            <p>太一 AGI v4.0 | 实时成本追踪与效率分析</p>
        </header>
        
        <!-- 汇总卡片 -->
        <div class="summary-cards">
            <div class="card">
                <h3>📊 总任务数</h3>
                <div class="value" id="total-tasks">0</div>
            </div>
            <div class="card">
                <h3>💰 总成本</h3>
                <div class="value" id="total-cost">¥0</div>
            </div>
            <div class="card">
                <h3>⚡ 平均效率</h3>
                <div class="value" id="avg-efficiency">0x</div>
            </div>
            <div class="card">
                <h3>🎯 总 Token</h3>
                <div class="value" id="total-tokens">0</div>
            </div>
        </div>
        
        <!-- 图表 -->
        <div class="charts-grid">
            <div class="chart-container">
                <h3>📈 成本趋势</h3>
                <canvas id="cost-chart"></canvas>
            </div>
            <div class="chart-container">
                <h3>📊 效率分布</h3>
                <canvas id="efficiency-chart"></canvas>
            </div>
        </div>
        
        <!-- 任务列表 -->
        <div class="table-container">
            <h3 style="color: #FF6B6B; margin-bottom: 20px;">📋 任务详情</h3>
            <table>
                <thead>
                    <tr>
                        <th>任务 ID</th>
                        <th>任务名称</th>
                        <th>状态</th>
                        <th>效率</th>
                        <th>成本 (¥)</th>
                        <th>ROI</th>
                    </tr>
                </thead>
                <tbody id="tasks-table">
                </tbody>
            </table>
        </div>
        
        <div class="refresh-info">
            <p>🔄 自动刷新：<span id="refresh-timer">10</span>秒 | 数据源：memory/YYYY-MM-DD.md | 太一 AGI v4.0</p>
        </div>
    </div>
    
    <script>
        // 模拟数据（实际应从 API 获取）
        const mockData = {
            date: '2026-04-02',
            tasks: [
                { id: 'TASK-050', name: '知几首笔下注', status: '完成', efficiency: '14x', cost: 0.35, roi: 'high' },
                { id: 'TASK-120', name: 'GitHub 爬虫开源', status: '完成', efficiency: '11x', cost: 0.42, roi: 'high' },
                { id: 'TASK-121', name: 'CLI 工具集发布', status: '完成', efficiency: '12x', cost: 0.28, roi: 'high' },
                { id: '-', name: '小红书发布', status: '完成', efficiency: '10x', cost: 0.31, roi: 'high' },
                { id: '-', name: 'Bot Dashboard 集成', status: '完成', efficiency: '8x', cost: 0.25, roi: 'medium' },
                { id: '-', name: 'ROI 可视化方案', status: '完成', efficiency: '9x', cost: 0.22, roi: 'medium' },
                { id: '-', name: '太一 v4.0 融合架构', status: '完成', efficiency: '14x', cost: 0.45, roi: 'high' },
                { id: '-', name: '浏览器适配器层', status: '完成', efficiency: '13x', cost: 0.38, roi: 'high' },
                { id: '-', name: '宪法经济学派', status: '完成', efficiency: '7x', cost: 0.52, roi: 'medium' },
                { id: '-', name: '气象数据采集', status: '完成', efficiency: '20x', cost: 0.18, roi: 'high' }
            ],
            summary: {
                total_tasks: 14,
                total_cost_yuan: 3.36,
                avg_efficiency: '11x',
                total_tokens: 185000
            }
        };
        
        // 更新汇总卡片
        function updateSummary(data) {
            document.getElementById('total-tasks').textContent = data.summary.total_tasks;
            document.getElementById('total-cost').textContent = '¥' + data.summary.total_cost_yuan.toFixed(2);
            document.getElementById('avg-efficiency').textContent = data.summary.avg_efficiency;
            document.getElementById('total-tokens').textContent = data.summary.total_tokens.toLocaleString();
        }
        
        // 更新任务表格
        function updateTable(data) {
            const tbody = document.getElementById('tasks-table');
            tbody.innerHTML = data.tasks.map(task => `
                <tr>
                    <td style="color: #4FC3F7; font-family: monospace;">${task.id}</td>
                    <td>${task.name}</td>
                    <td><span class="status-badge status-success">${task.status}</span></td>
                    <td style="color: #4CAF50; font-weight: bold;">${task.efficiency}</td>
                    <td style="color: #FFC107;">¥${task.cost.toFixed(2)}</td>
                    <td class="${task.roi === 'high' ? 'roi-high' : 'roi-medium'}">${task.roi === 'high' ? '🚀 高' : '⚡ 中'}</td>
                </tr>
            `).join('');
        }
        
        // 创建成本趋势图
        function createCostChart(tasks) {
            const ctx = document.getElementById('cost-chart').getContext('2d');
            const labels = tasks.map((_, i) => `T${i + 1}`);
            const data = tasks.map(t => t.cost);
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '成本 (¥)',
                        data: data,
                        borderColor: '#FF6B6B',
                        backgroundColor: 'rgba(255, 107, 107, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#FF6B6B',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#888' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#888' }
                        }
                    }
                }
            });
        }
        
        // 创建效率分布图
        function createEfficiencyChart(tasks) {
            const ctx = document.getElementById('efficiency-chart').getContext('2d');
            const data = tasks.map(t => parseFloat(t.efficiency));
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: tasks.map(t => t.id),
                    datasets: [{
                        label: '效率提升',
                        data: data,
                        backgroundColor: 'rgba(76, 175, 80, 0.6)',
                        borderColor: '#4CAF50',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#888' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#888', maxRotation: 45, minRotation: 45 }
                        }
                    }
                }
            });
        }
        
        // 初始化
        function init() {
            updateSummary(mockData);
            updateTable(mockData);
            createCostChart(mockData.tasks);
            createEfficiencyChart(mockData.tasks);
        }
        
        // 倒计时刷新
        let countdown = 10;
        setInterval(() => {
            countdown--;
            document.getElementById('refresh-timer').textContent = countdown;
            if (countdown <= 0) {
                countdown = 10;
                // 实际应从 API 重新获取数据
                console.log('刷新数据...');
            }
        }, 1000);
        
        // 启动
        init();
    </script>
</body>
</html>
