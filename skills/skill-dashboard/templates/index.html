<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太一 Skill 管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <h1 class="text-2xl font-bold">🎯 太一 Skill 管理中心</h1>
            <p class="text-sm text-gray-500 mt-1">可视化启动和管理 Skill 应用</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-gray-500 text-sm">总技能数</h3>
                <p id="total-skills" class="text-3xl font-bold text-blue-600">-</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-gray-500 text-sm">运行中</h3>
                <p id="running-skills" class="text-3xl font-bold text-green-600">-</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-gray-500 text-sm">系统状态</h3>
                <p id="system-health" class="text-3xl font-bold text-green-600">✅</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-gray-500 text-sm">刷新时间</h3>
                <p id="last-refresh" class="text-lg font-bold text-gray-600">-</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <input type="text" id="search-input" placeholder="🔍 搜索 Skill..." 
                   class="w-full px-4 py-2 border rounded-lg" oninput="filterSkills()">
        </div>

        <div id="skills-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <!-- 日志模态框 -->
    <div id="log-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-3/4 max-w-4xl max-h-3/4 overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="text-lg font-bold" id="log-title">应用日志</h3>
                <button onclick="closeLogs()" class="text-gray-500 hover:text-gray-700">✕</button>
            </div>
            <div class="p-4 overflow-auto max-h-96 bg-gray-900 text-green-400 font-mono text-sm" id="log-content">
                加载中...
            </div>
            <div class="p-4 border-t flex justify-end">
                <button onclick="refreshLogs()" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">🔄 刷新日志</button>
                <button onclick="closeLogs()" class="ml-2 px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">关闭</button>
            </div>
        </div>
    </div>

    <script>
        let allSkills = [];
        let runningProcesses = {};
        let currentLogSkill = null;

        async function loadSkills() {
            try {
                const [skillsRes, processesRes] = await Promise.all([
                    fetch('/api/skills'),
                    fetch('/api/system/processes')
                ]);
                
                const skillsData = await skillsRes.json();
                const processesData = await processesRes.json();
                
                if (skillsData && Array.isArray(skillsData.skills)) {
                    allSkills = skillsData.skills;
                    runningProcesses = processesData;
                    
                    // 合并运行状态
                    allSkills = allSkills.map(skill => ({
                        ...skill,
                        running: runningProcesses[skill.id]?.running || false,
                        url: runningProcesses[skill.id]?.url || null,
                        port: runningProcesses[skill.id]?.port || null
                    }));
                    
                    renderSkills(allSkills);
                    updateStats(allSkills);
                    updateRefreshTime();
                }
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('skills-grid').innerHTML = `
                    <div class="col-span-full text-center py-8">
                        <p class="text-red-500 text-lg">❌ 加载失败</p>
                        <p class="text-red-400 text-sm mt-2">${error.message}</p>
                        <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">🔄 刷新页面</button>
                    </div>
                `;
            }
        }

        function updateStats(skills) {
            const total = skills.length;
            const running = skills.filter(s => s.running).length;
            
            document.getElementById('total-skills').textContent = total;
            document.getElementById('running-skills').textContent = running;
        }

        function updateRefreshTime() {
            const now = new Date();
            document.getElementById('last-refresh').textContent = now.toLocaleTimeString('zh-CN');
        }

        function renderSkills(skills) {
            const grid = document.getElementById('skills-grid');
            
            if (!skills || skills.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 text-center col-span-full py-8">暂无 Skills 数据</p>';
                return;
            }
            
            grid.innerHTML = skills.map(skill => {
                const name = skill.name || skill.id || 'Unknown';
                const id = skill.id || 'unknown';
                const desc = skill.description || '暂无描述';
                const files = skill.files || 0;
                const size = ((skill.size || 0) / 1024).toFixed(1);
                const running = skill.running;
                const url = skill.url;
                const port = skill.port;
                
                return `<div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-lg font-bold">${name}</h3>
                            <p class="text-sm text-gray-500">${id}</p>
                        </div>
                        <span class="px-2 py-1 text-xs rounded ${running ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">
                            ${running ? '🟢 运行中' : '⚪ 未运行'}
                        </span>
                    </div>
                    <p class="text-sm text-gray-600 mt-2">${desc}</p>
                    ${url ? `<p class="text-xs text-blue-600 mt-1">🔗 ${url}</p>` : ''}
                    <div class="flex justify-between text-sm text-gray-500 mt-2">
                        <span>📁 ${files} 文件</span>
                        <span>💾 ${size} KB</span>
                    </div>
                    <div class="flex space-x-2 mt-4 pt-4 border-t">
                        ${running 
                            ? `<button onclick="openSkill('${id}')" class="flex-1 px-3 py-2 bg-blue-500 text-white text-sm rounded hover:bg-blue-600">🌐 打开</button>
                               <button onclick="stopSkill('${id}')" class="flex-1 px-3 py-2 bg-red-500 text-white text-sm rounded hover:bg-red-600">⏹️ 停止</button>`
                            : `<button onclick="startSkill('${id}')" class="flex-1 px-3 py-2 bg-green-500 text-white text-sm rounded hover:bg-green-600">▶️ 启动</button>
                               <button onclick="viewLogs('${id}')" class="flex-1 px-3 py-2 bg-gray-500 text-white text-sm rounded hover:bg-gray-600">📋 日志</button>`
                        }
                    </div>
                    <div class="flex space-x-2 mt-2">
                        <button onclick="viewLogs('${id}')" class="flex-1 px-3 py-2 bg-gray-100 text-gray-700 text-xs rounded hover:bg-gray-200">📋 日志</button>
                        <button onclick="checkStatus('${id}')" class="flex-1 px-3 py-2 bg-gray-100 text-gray-700 text-xs rounded hover:bg-gray-200">🔍 状态</button>
                    </div>
                </div>`;
            }).join('');
        }

        function filterSkills() {
            const query = document.getElementById('search-input').value.toLowerCase();
            renderSkills(allSkills.filter(s => s.name.toLowerCase().includes(query) || s.id.toLowerCase().includes(query)));
        }

        async function startSkill(skillId) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ 启动中...';
            
            try {
                const response = await fetch(`/api/skills/${skillId}/start`, { method: 'POST' });
                const data = await response.json();
                
                if (data.error) {
                    alert(`启动失败：${data.error}`);
                } else {
                    alert(`✅ 应用已启动！\n端口：${data.port || '未知'}\n${data.url ? 'URL: ' + data.url : ''}`);
                    setTimeout(loadSkills, 2000); // 2 秒后刷新状态
                }
            } catch (error) {
                alert(`启动失败：${error.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '▶️ 启动';
            }
        }

        async function stopSkill(skillId) {
            if (!confirm('确定要停止这个应用吗？')) return;
            
            try {
                const response = await fetch(`/api/skills/${skillId}/stop`, { method: 'POST' });
                const data = await response.json();
                
                if (data.error) {
                    alert(`停止失败：${data.error}`);
                } else {
                    alert('✅ 应用已停止');
                    setTimeout(loadSkills, 1000);
                }
            } catch (error) {
                alert(`停止失败：${error.message}`);
            }
        }

        async function openSkill(skillId) {
            try {
                const response = await fetch(`/api/skills/${skillId}/open`, { method: 'POST' });
                const data = await response.json();
                
                if (data.error) {
                    alert(data.error);
                } else {
                    window.open(data.url, '_blank');
                }
            } catch (error) {
                alert(`打开失败：${error.message}`);
            }
        }

        async function checkStatus(skillId) {
            try {
                const response = await fetch(`/api/skills/${skillId}/status`);
                const data = await response.json();
                
                if (data.running) {
                    alert(`✅ 应用运行中\nPID: ${data.pid}\n端口：${data.port}\nURL: ${data.url}`);
                } else {
                    alert('⚪ 应用未运行');
                }
            } catch (error) {
                alert(`查询失败：${error.message}`);
            }
        }

        async function viewLogs(skillId) {
            currentLogSkill = skillId;
            document.getElementById('log-title').textContent = `${skillId} - 应用日志`;
            document.getElementById('log-modal').classList.remove('hidden');
            document.getElementById('log-modal').classList.add('flex');
            await refreshLogs();
        }

        async function refreshLogs() {
            if (!currentLogSkill) return;
            
            const logContent = document.getElementById('log-content');
            logContent.textContent = '加载中...';
            
            try {
                const response = await fetch(`/api/skills/${currentLogSkill}/logs?lines=200`);
                const data = await response.json();
                
                if (data.logs) {
                    logContent.textContent = data.logs || '暂无日志';
                } else if (data.error) {
                    logContent.textContent = `错误：${data.error}`;
                } else {
                    logContent.textContent = '暂无日志';
                }
            } catch (error) {
                logContent.textContent = `加载失败：${error.message}`;
            }
        }

        function closeLogs() {
            document.getElementById('log-modal').classList.add('hidden');
            document.getElementById('log-modal').classList.remove('flex');
            currentLogSkill = null;
        }

        // 自动刷新运行状态（每 10 秒）
        setInterval(() => {
            loadSkills();
        }, 10000);

        document.addEventListener('DOMContentLoaded', loadSkills);
    </script>
</body>
</html>
