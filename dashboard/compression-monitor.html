<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboQuant 压缩率监控</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #606060;
            --accent: #ffffff;
            --warning: #ff6b6b;
            --success: #51cf66;
            --border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .card-title {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .card-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
        }

        .card-value.warning {
            color: var(--warning);
        }

        .card-value.success {
            color: var(--success);
        }

        .card-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .chart-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chart {
            height: 300px;
            position: relative;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            border-left: 1px solid var(--border);
        }

        .bar {
            flex: 1;
            background: var(--accent);
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            transition: all 0.3s ease;
            position: relative;
        }

        .bar.warning {
            background: var(--warning);
        }

        .bar.success {
            background: var(--success);
        }

        .bar:hover {
            opacity: 0.8;
        }

        .bar-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .bar-value {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: var(--text-secondary);
        }

        .alert-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .alert-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .alert-icon.active {
            background: var(--warning);
            color: var(--bg-primary);
        }

        .alert-icon.inactive {
            background: var(--bg-tertiary);
            color: var(--text-muted);
        }

        .alert-list {
            list-style: none;
        }

        .alert-item {
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .alert-item:last-child {
            margin-bottom: 0;
        }

        .alert-item.warning {
            border-left: 3px solid var(--warning);
        }

        .alert-time {
            color: var(--text-muted);
            font-size: 12px;
        }

        .file-list {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .file-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .file-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .file-table th {
            text-align: left;
            padding: 10px;
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        .file-table td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        .file-table tr:last-child td {
            border-bottom: none;
        }

        .file-name {
            font-family: 'SF Mono', monospace;
            font-size: 12px;
            color: var(--text-primary);
        }

        .file-size {
            color: var(--text-secondary);
            text-align: right;
        }

        .compression-rate {
            text-align: right;
            font-weight: 600;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.good {
            background: var(--success);
        }

        .status-indicator.warning {
            background: var(--warning);
        }

        .refresh-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: var(--border);
        }

        .last-update {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 20px;
            text-align: center;
        }

        .target-range {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .card-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 TurboQuant 压缩率监控</h1>
            <div class="subtitle">实时追踪记忆文件压缩效率 · 目标压缩率 4-6x</div>
        </header>

        <div class="dashboard">
            <div class="card">
                <div class="card-title">实时压缩率</div>
                <div class="card-value" id="current-rate">--</div>
                <div class="card-subtitle">当前会话平均</div>
                <div class="target-range">目标：4-6x</div>
            </div>

            <div class="card">
                <div class="card-title">7 日平均</div>
                <div class="card-value" id="avg-rate">--</div>
                <div class="card-subtitle">过去 7 天趋势</div>
                <div class="target-range">基准：≥4x</div>
            </div>

            <div class="card">
                <div class="card-title">总文件数</div>
                <div class="card-value" id="file-count">--</div>
                <div class="card-subtitle">memory 目录</div>
                <div class="target-range">核心 + 残差</div>
            </div>

            <div class="card">
                <div class="card-title">告警状态</div>
                <div class="card-value" id="alert-status" style="font-size: 24px;">--</div>
                <div class="card-subtitle">阈值：&lt;3x</div>
                <div class="target-range">异常检测</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">
                <span>📈 7 日压缩率趋势</span>
                <button class="refresh-btn" onclick="refreshData()">刷新数据</button>
            </div>
            <div class="chart" id="trend-chart">
                <!-- Bars will be generated by JavaScript -->
            </div>
        </div>

        <div class="alert-section">
            <div class="alert-title">
                <div class="alert-icon" id="alert-icon">!</div>
                <span>异常告警 (压缩率 &lt; 3x)</span>
            </div>
            <ul class="alert-list" id="alert-list">
                <li class="alert-item" style="color: var(--text-muted);">暂无告警</li>
            </ul>
        </div>

        <div class="file-list">
            <div class="file-title">📁 文件详情</div>
            <table class="file-table">
                <thead>
                    <tr>
                        <th>文件名</th>
                        <th style="text-align: right;">大小 (KB)</th>
                        <th style="text-align: right;">压缩率</th>
                        <th style="text-align: right;">状态</th>
                    </tr>
                </thead>
                <tbody id="file-table-body">
                    <!-- Rows will be generated by JavaScript -->
                </tbody>
            </table>
        </div>

        <div class="last-update">
            最后更新：<span id="last-update">--</span>
        </div>
    </div>

    <script>
        // 数据将从本地 JSON 文件加载（离线可用）
        let dashboardData = null;

        // 计算压缩率
        function calculateCompressionRate(file) {
            if (!file.originalSize || file.originalSize === 0) return 0;
            return (file.originalSize / file.size).toFixed(2);
        }

        // 格式化文件大小
        function formatSize(bytes) {
            return (bytes / 1024).toFixed(1);
        }

        // 获取状态类
        function getStatusClass(rate) {
            if (rate < 3) return 'warning';
            if (rate >= 4 && rate <= 6) return 'success';
            return '';
        }

        // 获取状态指示器
        function getStatusIndicator(rate) {
            if (rate < 3) return 'warning';
            return 'good';
        }

        // 渲染图表
        function renderChart(history) {
            const chart = document.getElementById('trend-chart');
            chart.innerHTML = '';

            const maxRate = Math.max(...history.map(h => h.rate), 6);
            const minRate = Math.min(...history.map(h => h.rate), 0);

            history.forEach(item => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                
                const rate = item.rate;
                const heightPercent = ((rate - minRate) / (maxRate - minRate)) * 80 + 20;
                bar.style.height = `${heightPercent}%`;
                
                if (rate < 3) {
                    bar.classList.add('warning');
                } else if (rate >= 4 && rate <= 6) {
                    bar.classList.add('success');
                }

                const valueLabel = document.createElement('div');
                valueLabel.className = 'bar-value';
                valueLabel.textContent = `${rate}x`;

                const label = document.createElement('div');
                label.className = 'bar-label';
                label.textContent = item.date;

                bar.appendChild(valueLabel);
                bar.appendChild(label);
                chart.appendChild(bar);
            });
        }

        // 渲染文件列表
        function renderFileTable(files) {
            const tbody = document.getElementById('file-table-body');
            tbody.innerHTML = '';

            files.forEach(file => {
                const rate = calculateCompressionRate(file);
                const statusClass = getStatusClass(rate);
                const indicatorClass = getStatusIndicator(rate);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="file-name">${file.name}</td>
                    <td class="file-size">${formatSize(file.size)}</td>
                    <td class="compression-rate ${statusClass}">${rate}x</td>
                    <td style="text-align: right;">
                        <span class="status-indicator ${indicatorClass}"></span>
                        ${rate < 3 ? '告警' : '正常'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 渲染告警列表
        function renderAlerts(alerts) {
            const list = document.getElementById('alert-list');
            const icon = document.getElementById('alert-icon');

            if (alerts.length === 0) {
                list.innerHTML = '<li class="alert-item" style="color: var(--text-muted);">暂无告警</li>';
                icon.className = 'alert-icon inactive';
                document.getElementById('alert-status').textContent = '正常';
                document.getElementById('alert-status').className = 'card-value success';
            } else {
                icon.className = 'alert-icon active';
                document.getElementById('alert-status').textContent = `${alerts.length} 个告警`;
                document.getElementById('alert-status').className = 'card-value warning';

                list.innerHTML = alerts.map(alert => `
                    <li class="alert-item warning">
                        <span>${alert.file} - 压缩率 ${alert.rate}x</span>
                        <span class="alert-time">${alert.time}</span>
                    </li>
                `).join('');
            }
        }

        // 更新仪表盘
        function updateDashboard(data) {
            // 计算实时压缩率
            const rates = data.files.map(f => parseFloat(calculateCompressionRate(f)));
            const currentRate = (rates.reduce((a, b) => a + b, 0) / rates.length).toFixed(2);
            
            // 计算 7 日平均
            const avgRate = data.history.reduce((a, b) => a + b.rate, 0) / data.history.length;
            
            // 更新卡片
            const currentRateEl = document.getElementById('current-rate');
            currentRateEl.textContent = `${currentRate}x`;
            currentRateEl.className = `card-value ${getStatusClass(currentRate)}`;

            document.getElementById('avg-rate').textContent = `${avgRate.toFixed(2)}x`;
            document.getElementById('file-count').textContent = data.files.length;

            // 检测告警
            const alerts = data.files
                .filter(f => calculateCompressionRate(f) < 3)
                .map(f => ({
                    file: f.name,
                    rate: calculateCompressionRate(f),
                    time: new Date().toLocaleTimeString('zh-CN')
                }));

            renderAlerts(alerts);
            renderChart(data.history);
            renderFileTable(data.files);

            // 更新时间
            document.getElementById('last-update').textContent = new Date().toLocaleString('zh-CN');
        }

        // 刷新数据
        function refreshData() {
            // 从本地 JSON 文件加载数据（离线可用）
            fetch('compression-data.json?t=' + Date.now())
                .then(res => {
                    if (!res.ok) throw new Error('数据加载失败');
                    return res.json();
                })
                .then(data => {
                    dashboardData = data;
                    updateDashboard(data);
                })
                .catch(err => {
                    console.error('加载数据失败:', err);
                    // 如果加载失败，使用空数据
                    updateDashboard({ files: [], history: [], alerts: [] });
                });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            refreshData();
            
            // 每 5 分钟自动刷新
            setInterval(refreshData, 5 * 60 * 1000);
        });
    </script>
</body>
</html>
