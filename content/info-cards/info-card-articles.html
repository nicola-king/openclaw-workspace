<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600">
  <style>
@font-face {
  font-family: 'TsangerJinKai';
  src: local('Noto Serif CJK SC'), local('Source Han Serif SC'), serif;
  font-weight: normal;
  font-style: normal;
  font-display: block;
}

:root {
  --font-title: 'TsangerJinKai', serif;
  --font-body: 'TsangerJinKai', serif;
  --font-label: 'TsangerJinKai', sans-serif;
  --color-bg: #f5f3ed;
  --color-text: #1a1a1a;
  --color-accent: #5b2d8e;
  --color-muted: #555;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  margin: 0;
  background: var(--color-bg);
}

.card {
  width: 600px;
  background: var(--color-bg);
  padding: 38px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: relative;
  overflow: hidden;
  min-height: 900px;
  justify-content: space-between;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.card > * { position: relative; z-index: 1; }

.main-title {
  font-family: var(--font-title);
  font-size: 56px;
  font-weight: normal;
  line-height: 1.15;
  color: #0a0a0a;
  letter-spacing: 0.02em;
}

.content-body {
  font-family: var(--font-body);
  font-size: 20px;
  line-height: 1.65;
  color: #1a1a1a;
}

.accent-bar {
  height: 6px;
  background: var(--color-accent);
  width: 80px;
}

.accent-bar-full {
  height: 4px;
  background: var(--color-accent);
  width: 100%;
}

.label {
  font-family: var(--font-label);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-accent);
}

.bg-block {
  background: rgba(0,0,0,0.03);
  padding: 18px 20px;
  border-left: 4px solid var(--color-accent);
}

.footer {
  font-size: 15px;
  color: #888;
  letter-spacing: 0.05em;
  border-top: 1px solid rgba(0,0,0,0.1);
  padding-top: 15px;
  margin-top: 10px;
}

.points {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.point {
  padding: 16px 18px;
  background: rgba(0,0,0,0.035);
  border-left: 4px solid var(--color-accent);
}

.point h3 {
  font-family: var(--font-title);
  font-size: 22px;
  font-weight: normal;
  margin-bottom: 6px;
  color: #0a0a0a;
}

.point p {
  font-size: 16px;
  line-height: 1.6;
}

.stat-number {
  font-family: var(--font-label);
  font-size: 72px;
  font-weight: 700;
  line-height: 1.0;
  color: var(--color-accent);
  letter-spacing: -0.05em;
}
  </style>
</head>
<body>
<div class="card">
  <div>
    <div class="label">内容创作 · 系列文章</div>
    <div class="accent-bar" style="margin-bottom: 20px;"></div>
    <h1 class="main-title">Claude Code<br>系列文章</h1>
  </div>

  <div class="points">
    <div class="point">
      <h3>📕 小红书</h3>
      <p>2100 字 · 轻松风格 · Emoji 丰富<br>标签：#AI 编程 #ClaudeCode #程序员日常</p>
    </div>
    <div class="point">
      <h3>📖 公众号</h3>
      <p>4200 字 · 深度分析 · 行业洞察<br>包含：安装教程 + 实战案例 + 模型选择策略</p>
    </div>
    <div class="point">
      <h3>🎨 信息卡</h3>
      <p>3 张系列卡片 · 杂志质感<br>快速上手 / 进阶技巧 / 历史洞察</p>
    </div>
  </div>

  <div class="bg-block">
    <p style="font-size: 18px;"><strong>📊 内容统计：</strong></p>
    <div style="display: flex; justify-content: space-around; margin-top: 16px; text-align: center;">
      <div>
        <div class="stat-number">2</div>
        <p style="font-size: 14px; margin-top: 8px;">篇文章</p>
      </div>
      <div>
        <div class="stat-number">3</div>
        <p style="font-size: 14px; margin-top: 8px;">张卡片</p>
      </div>
      <div>
        <div class="stat-number">6K</div>
        <p style="font-size: 14px; margin-top: 8px;">总字数</p>
      </div>
    </div>
  </div>

  <div class="footer">太一 AGI 内容工厂 · 2026-04-02</div>
</div>
</body>
</html>
