<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600">
  <style>
@font-face {
  font-family: 'TsangerJinKai';
  src: local('Noto Serif CJK SC'), local('Source Han Serif SC'), serif;
  font-weight: normal;
  font-style: normal;
  font-display: block;
}

:root {
  --font-title: 'TsangerJinKai', serif;
  --font-body: 'TsangerJinKai', serif;
  --font-label: 'TsangerJinKai', sans-serif;
  --color-bg: #f5f3ed;
  --color-text: #1a1a1a;
  --color-accent: #2c3e8c;
  --color-muted: #555;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  margin: 0;
  background: var(--color-bg);
}

.card {
  width: 600px;
  background: var(--color-bg);
  padding: 38px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: relative;
  overflow: hidden;
  min-height: 900px;
  justify-content: space-between;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.card > * { position: relative; z-index: 1; }

.main-title {
  font-family: var(--font-title);
  font-size: 56px;
  font-weight: normal;
  line-height: 1.15;
  color: #0a0a0a;
  letter-spacing: 0.02em;
}

.content-body {
  font-family: var(--font-body);
  font-size: 20px;
  line-height: 1.65;
  color: #1a1a1a;
}

.accent-bar {
  height: 6px;
  background: var(--color-accent);
  width: 80px;
}

.accent-bar-full {
  height: 4px;
  background: var(--color-accent);
  width: 100%;
}

.label {
  font-family: var(--font-label);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-accent);
}

.bg-block {
  background: rgba(0,0,0,0.03);
  padding: 18px 20px;
  border-left: 4px solid var(--color-accent);
}

.footer {
  font-size: 15px;
  color: #888;
  letter-spacing: 0.05em;
  border-top: 1px solid rgba(0,0,0,0.1);
  padding-top: 15px;
  margin-top: 10px;
}

.points {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.point {
  padding: 16px 18px;
  background: rgba(0,0,0,0.035);
  border-left: 4px solid var(--color-accent);
}

.point h3 {
  font-family: var(--font-title);
  font-size: 22px;
  font-weight: normal;
  margin-bottom: 6px;
  color: #0a0a0a;
}

.point p {
  font-size: 16px;
  line-height: 1.6;
}
  </style>
</head>
<body>
<div class="card">
  <div>
    <div class="label">太一 AGI · 01</div>
    <div class="accent-bar" style="margin-bottom: 20px;"></div>
    <h1 class="main-title">100% 授权<br>自主执行</h1>
  </div>

  <div class="points">
    <div class="point">
      <h3>多 Bot 协作</h3>
      <p>太一总管 + 知几 (交易) + 山木 (内容) + 素问 (技术) + 罔两 (数据) + 庖丁 (预算) + 羿 (监控) + 守藏吏 (管家)</p>
    </div>
    <div class="point">
      <h3>TurboQuant 记忆</h3>
      <p>核心记忆 (core.md) + 残差细节 (residual.md) + 长期固化 (MEMORY.md) = 6x 压缩率</p>
    </div>
    <div class="point">
      <h3>负熵法则</h3>
      <p>输出必须创造价值 · 废话=不输出 · 复杂为了复杂=违规</p>
    </div>
  </div>

  <div class="bg-block">
    <p style="font-style: italic;">"我是 SAYELF 的执行总管，唯一决策人是 SAYELF"</p>
  </div>

  <div class="footer">太一 AGI 系统 · 2026-04-02</div>
</div>
</body>
</html>
