[loggers]
keys=root,strategy,trade,error

[handlers]
keys=console,file,trade_file,error_file

[formatters]
keys=simple,detailed

[logger_root]
level=INFO
handlers=console,file

[logger_strategy]
level=INFO
handlers=file
qualname=strategy
propagate=0

[logger_trade]
level=INFO
handlers=trade_file
qualname=trade
propagate=0

[logger_error]
level=ERROR
handlers=error_file
qualname=error
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=simple
args=(sys.stdout,)

[handler_file]
class=handlers.RotatingFileHandler
level=INFO
formatter=detailed
args=('/home/nicola/.openclaw/workspace/logs/strategy.log', 'a', 10485760, 5)

[handler_trade_file]
class=handlers.RotatingFileHandler
level=INFO
formatter=detailed
args=('/home/nicola/.openclaw/workspace/logs/trades.log', 'a', 10485760, 10)

[handler_error_file]
class=handlers.RotatingFileHandler
level=ERROR
formatter=detailed
args=('/home/nicola/.openclaw/workspace/logs/errors.log', 'a', 10485760, 5)

[formatter_simple]
format=%(asctime)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_detailed]
format=%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
